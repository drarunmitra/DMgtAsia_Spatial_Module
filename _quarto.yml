project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "exercises/*.qmd"
    - "exercises/*.Rmd"
    - "!capstone/report.qmd"
    - "!resources/prerequisites.qmd"
    - "!session2a-exploring-data-with-r.qmd"
    - "!session2b-spatial-data-vis.qmd"
  resources:
    - resources/
    - exercises/
    - data/
    # spatial_files/ (117 MB) is NOT served via Pages — clone the repo to run exercises

website:
  title: "DMgtAsia · Spatial Epidemiology"
  description: "Spatial Epidemiology and Applied Data Science, a module of the DMgtAsia course"
  favicon: dmgt_asia_logo.png
  navbar:
    background: light
    logo: dmgt_asia_logo.png
    left:
      - href: index.qmd
        text: Home
      - href: setup.qmd
        text: Setup
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/drarunmitra/DMgtAsia_Spatial_Module
  sidebar:
    style: docked
    search: true
    collapse-level: 1
    contents:
      - text: Home
        href: index.qmd
      - section: "Session-I · Foundations"
        contents:
          - text: "Intro to GIS for Public Health"
            href: session1a-intro-gis-public-health_v2.qmd
          - text: "Concepts in Spatial Data Science"
            href: session1b-concepts-spatial-data-science.qmd
      - section: "Session-II · ESDA"
        contents:
          - text: "Spatial Data Visualization & Cartography"
            href: session2-1-spatial-visualization.qmd
          - text: "Exploratory Spatial Data Analysis"
            href: session2-2-esda.qmd
      - section: "Session-III · Intro to sf"
        contents:
          - text: "The sf package"
            href: session2c-intro-sf-package.qmd
          - text: "The sf package (updated)"
            href: session2c-intro-sf-package_UPDATED.qmd
          - text: "Exercise 1: Shapefiles"
            href: exercises/hands_on_exercise_1.R
          - text: "Exercise 2: Choropleth"
            href: exercises/hands_on_exercise_2.R
          - text: "Exercise 3: Raster extraction"
            href: exercises/hands_on_exercise_3.R
          - text: "Exercise 4: Geocoding"
            href: exercises/hands_on_exercise_4.R
      - section: "Session-IV · Analysis & Clustering"
        contents:
          - text: "Exercise 6: NFHS malnutrition maps"
            href: exercises/hands_on_exercise_6.R
          - text: "Exercise 7: Spatial clustering (LISA)"
            href: exercises/hands_on_exercise_7.R
          - text: "John Snow's cholera map"
            href: exercises/john_snow_map_excercise.qmd
          - text: "SIR / SMR: Kerala COVID-19"
            href: exercises/SIR_SMR_assignment.Rmd
          - text: "Capstone"
            href: capstone.qmd
      - section: "Reference"
        contents:
          - text: Setup
            href: setup.qmd
          - text: About
            href: about.qmd
  page-footer:
    left: "DMgtAsia · Spatial Epidemiology Module"
    right: "SCTIMST, Trivandrum · AIIMS Bibinagar"

format:
  html:
    theme: dmgt-web.scss
    toc: true

execute:
  freeze: auto
  warning: false
  message: false
